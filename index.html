<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>道案内</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: black;
  font-family: sans-serif;
}

/* 全体レイアウト（画像＋説明） */
.container {
  width: 100vw;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* スワイパー領域 */
.swiper {
  flex: 1;
  width: 100%;
  position: relative;
}

/* 画像 */
.photo {
  width: 100%;
  height: 100%;
  object-fit: contain;
  background: black;
}

/* チラ見せ */
.swiper-slide {
  opacity: 0.4;
  transition: 0.3s;
}

.swiper-slide-active {
  opacity: 1;
}

/* 矢印 */
.nav-arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  font-size: 42px;
  color: white;
  z-index: 20;
  opacity: 0.85;
  text-shadow: 0 0 10px rgba(0,0,0,0.8);
  cursor: pointer;
}

.nav-arrow.left {
  left: 10px;
}

.nav-arrow.right {
  right: 10px;
}

/* 説明欄（写真の外） */
.caption-bar {
  height: 70px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 16px;
  background: rgba(0,0,0,0.85);
  border-top: 1px solid rgba(255,255,255,0.1);
  padding: 0 12px;
  text-align: center;
}

/* ドット */
.swiper-pagination-bullet {
  background: white;
}
</style>
</head>

<body>

<div class="container">

  <div class="swiper">

    <!-- 矢印（クリック可能） -->
    <div class="nav-arrow left" id="prev">＜</div>
    <div class="nav-arrow right" id="next">＞</div>

    <div class="swiper-wrapper" id="slides"></div>
    <div class="swiper-pagination"></div>

  </div>

  <!-- 写真の外に説明 -->
  <div class="caption-bar" id="caption">
    スタート地点
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>
const total = 19;
const container = document.getElementById('slides');
const caption = document.getElementById('caption');

/* スライド生成 */
for (let i = 1; i <= total; i++) {
  container.innerHTML += `
    <div class="swiper-slide">
      <img src="root${i}.jpg" class="photo">
    </div>
  `;
}

/* Swiper */
const swiper = new Swiper('.swiper', {
  loop: false,
  centeredSlides: true,
  slidesPerView: 1.15,
  spaceBetween: 10,
  speed: 300,

  pagination: {
    el: '.swiper-pagination',
    clickable: true
  },

  on: {
    slideChange: function () {
      const i = this.activeIndex + 1;
      caption.textContent = (i === total)
        ? "到着です！"
        : `STEP ${i}`;
    }
  }
});

/* 矢印クリックで移動 */
document.getElementById('prev').addEventListener('click', () => {
  swiper.slidePrev();
});

document.getElementById('next').addEventListener('click', () => {
  swiper.slideNext();
});
</script>

</body>
</html>
