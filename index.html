<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>道案内</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: #f7f5f0;
  font-family: sans-serif;
}

/* 全体 */
.container {
  width: 100vw;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* スライダー */
.swiper {
  flex: 1;
  width: 100%;
  position: relative;
}

/* 画像 */
.photo {
  width: 100%;
  height: 100%;
  object-fit: contain;
  background: #f7f5f0;
}

/* スライド見せ方 */
.swiper-slide {
  opacity: 0.4;
  transition: 0.3s;
}

.swiper-slide-active {
  opacity: 1;
}

/* 矢印 */
.nav-arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  font-size: 42px;
  color: #c7a86b;
  z-index: 20;
  cursor: pointer;
  text-shadow: 0 0 6px rgba(0,0,0,0.15);
}

.nav-arrow.left { left: 10px; }
.nav-arrow.right { right: 10px; }

/* 説明バー */
.caption-bar {
  height: 70px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 12px;

  font-size: 16px;
  color: #333;

  background: rgba(255,255,255,0.85);
  border-top: 1px solid rgba(0,0,0,0.08);
}

/* ===== 丸ポチ（2段＋千鳥）===== */

.swiper-pagination {
  position: absolute;
  bottom: 10px !important;

  width: 100%;
  display: grid;
  grid-template-columns: repeat(10, auto);

  justify-content: center;
  align-content: center;

  gap: 10px 8px;
  padding: 8px 12px;
  box-sizing: border-box;
}

.swiper-pagination-bullet {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #c7a86b;
  opacity: 0.35;

  border: 1.5px solid rgba(255,255,255,0.9);
}

.swiper-pagination-bullet-active {
  background: #a8864a;
  opacity: 1;
  border: 2px solid #fff;
  transform: scale(1.25);
}

/* 千鳥配置 */
.swiper-pagination-bullet:nth-child(n+11) {
  transform: translateX(10px);
}
</style>
</head>

<body>

<div class="container">

  <div class="swiper">

    <div class="nav-arrow left" id="prev">＜</div>
    <div class="nav-arrow right" id="next">＞</div>

    <div class="swiper-wrapper" id="slides"></div>
    <div class="swiper-pagination"></div>

  </div>

  <div class="caption-bar" id="caption">
    読み込み中...
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>
const total = 19;

let captions = [];

/* スライド生成 */
const container = document.getElementById('slides');
const caption = document.getElementById('caption');

for (let i = 1; i <= total; i++) {
  container.innerHTML += `
    <div class="swiper-slide">
      <img src="root${i}.jpg" class="photo">
    </div>
  `;
}

/* JSON読み込み */
fetch('captions.json')
  .then(res => res.json())
  .then(data => {
    captions = data;
    caption.textContent = captions[0] || '';
  });

/* Swiper */
const swiper = new Swiper('.swiper', {
  loop: false,
  centeredSlides: true,
  slidesPerView: 1.15,
  spaceBetween: 10,
  speed: 300,

  pagination: {
    el: '.swiper-pagination',
    clickable: true
  },

  on: {
    slideChange: function () {
      const i = this.activeIndex;

      if (captions[i]) {
        caption.textContent = captions[i];
      }

      if (i === total - 1) {
        caption.textContent = "到着です！";
      }
    }
  }
});

/* 矢印操作 */
document.getElementById('prev').onclick = () => swiper.slidePrev();
document.getElementById('next').onclick = () => swiper.slideNext();
</script>

</body>
</html>
