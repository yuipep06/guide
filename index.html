<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>道案内</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: #f7f5f0;
  font-family: sans-serif;

  /* ★重要：スクロール制御 */
  height: 100%;
  overflow: hidden;
}

/* ★重要：固定レイアウト */
.container {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
}

/* ★重要：高さ明示 */
.swiper {
  width: 100%;
  height: calc(100% - 70px);
  position: relative;
}

.swiper-wrapper,
.swiper-slide {
  height: 100%;
}

.swiper-slide {
  display: flex;
  align-items: center;
  justify-content: center;
}

.photo {
  width: 100%;
  height: 100%;
  object-fit: contain;
  background: #f7f5f0;
}

/* 矢印 */
.nav-arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  font-size: 42px;
  color: #c7a86b;
  z-index: 20;
  cursor: pointer;
}

.nav-arrow.left { left: 10px; }
.nav-arrow.right { right: 10px; }

/* 説明 */
.caption-bar {
  height: 70px;
  display: flex;
  align-items: center;
  justify-content: center;

  padding: 0 12px;
  font-size: 16px;
  color: #333;

  background: rgba(255,255,255,0.95);
  border-top: 1px solid rgba(0,0,0,0.08);

  /* ★重要：固定 */
  flex-shrink: 0;
}

/* 数値 */
.counter {
  position: absolute;
  bottom: 12px;
  left: 50%;
  transform: translateX(-50%);

  background: rgba(0,0,0,0.55);
  color: #fff;

  padding: 6px 14px;
  border-radius: 20px;

  font-size: 14px;
  z-index: 50;
}
</style>
</head>

<body>

<div class="container">

  <div class="swiper">

    <div class="nav-arrow left" id="prev">＜</div>
    <div class="nav-arrow right" id="next">＞</div>

    <div class="swiper-wrapper" id="slides"></div>

    <div class="counter" id="counter">1 / 1</div>

  </div>

  <div class="caption-bar" id="caption">読み込み中...</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>
let captions = [];

const slides = document.getElementById('slides');
const captionEl = document.getElementById('caption');
const counterEl = document.getElementById('counter');

/* JSON読み込み */
fetch('captions.json')
  .then(res => res.json())
  .then(data => {

    captions = Array.isArray(data) ? data : [];

    // ★重要：初期化前に必ずクリア
    slides.innerHTML = "";

    captions.forEach((_, i) => {
      const slide = document.createElement('div');
      slide.className = 'swiper-slide';

      const img = document.createElement('img');
      img.src = `root${i + 1}.jpg`;
      img.className = 'photo';

      slide.appendChild(img);
      slides.appendChild(slide);
    });

    initSwiper();
  });
  
function initSwiper() {

  const swiper = new Swiper('.swiper', {
    loop: false,
    centeredSlides: true,
    slidesPerView: 1,
    spaceBetween: 0,
    speed: 300,

    on: {
      init: function () {
        updateUI(0);
      },
      realIndexChange: function () {
        updateUI(this.realIndex);
      }
    }
  });

  document.getElementById('prev').onclick = () => swiper.slidePrev();
  document.getElementById('next').onclick = () => swiper.slideNext();
}

function updateUI(i) {
  captionEl.innerHTML = captions[i] ?? "";
  counterEl.textContent = `${i + 1} / ${captions.length}`;
}
</script>

</body>
</html>
