<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Route Guide</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>

<style>
/* =========================
   BASE RESET
========================= */
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  background: #f7f5f0;
  font-family: sans-serif;
  overflow: hidden;
}

/* =========================
   SWIPER AREA (isolated)
========================= */
.swiper {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 90px; /* caption + margin reserved */
  width: 100%;
  overflow: hidden;
  background: #f7f5f0;
}

.swiper-slide {
  display: flex;
  align-items: center;
  justify-content: center;
}

.photo {
  width: 100%;
  height: 100%;
  object-fit: contain;
  background: #f7f5f0;
}

/* =========================
   NAV ARROWS (fixed overlay)
========================= */
.nav-arrow {
  position: fixed;
  top: 50%;
  transform: translateY(-50%);
  font-size: 42px;
  color: #c7a86b;
  z-index: 9999;
  cursor: pointer;
  user-select: none;
}

.nav-arrow.left { left: 10px; }
.nav-arrow.right { right: 10px; }

/* =========================
   CAPTION (fixed layer)
========================= */
.caption-bar {
  position: fixed;
  left: 0;
  right: 0;
  bottom: 30px;
  height: 60px;

  display: -webkit-box;
  -webkit-box-orient: vertical;
  -webkit-line-clamp: 2;

  padding: 6px 12px;
  font-size: 16px;
  line-height: 1.4;

  background: rgba(255,255,255,0.95);
  border-top: 1px solid rgba(0,0,0,0.08);

  overflow: hidden;
  word-break: break-word;
  z-index: 9998;
}

/* Safari tweak */
.safari .caption-bar {
  line-height: 1.35;
}

/* =========================
   COUNTER (fixed safe layer)
========================= */
.counter {
  position: fixed;
  bottom: 5px;
  left: 50%;
  transform: translateX(-50%);

  background: rgba(0,0,0,0.7);
  color: #fff;
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 14px;

  z-index: 9999;
}

/* =========================
   SAFE AREA (iPhone notch)
========================= */
@supports (padding: max(0px)) {
  .caption-bar {
    padding-bottom: max(6px, env(safe-area-inset-bottom));
  }
}
</style>
</head>

<body>

<!-- Swiper -->
<div class="swiper">
  <div class="swiper-wrapper" id="slides"></div>
</div>

<!-- UI LAYER -->
<div class="nav-arrow left" id="prev">‹</div>
<div class="nav-arrow right" id="next">›</div>

<div class="caption-bar" id="caption">Loading...</div>
<div class="counter" id="counter">- / -</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>
let captions = [];
let swiper = null;

const slides = document.getElementById('slides');
const captionEl = document.getElementById('caption');
const counterEl = document.getElementById('counter');

/* Safari detect */
const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
if (isSafari) {
  document.documentElement.classList.add("safari");
}

/* =========================
   UI UPDATE (safe render)
========================= */
function updateUI(i) {

  captionEl.textContent = "";

  requestAnimationFrame(() => {
    captionEl.textContent = captions[i] ?? "";
  });

  counterEl.textContent = `${i + 1} / ${captions.length || 0}`;
}

/* =========================
   SLIDES
========================= */
function buildSlides(len) {
  slides.innerHTML = "";

  for (let i = 1; i <= len; i++) {
    const slide = document.createElement('div');
    slide.className = 'swiper-slide';

    const img = document.createElement('img');
    img.src = `root${i}.jpg`;
    img.className = 'photo';

    slide.appendChild(img);
    slides.appendChild(slide);
  }
}

/* =========================
   SWIPER INIT
========================= */
function initSwiper() {

  if (swiper) swiper.destroy(true, true);

  swiper = new Swiper('.swiper', {

    loop: false,
    centeredSlides: true,
    slidesPerView: 1,

    on: {
      init: function () {
        updateUI(this.realIndex);
      },
      slideChange: function () {
        updateUI(this.realIndex);
      }
    }
  });

  document.getElementById('prev').onclick = () => swiper.slidePrev();
  document.getElementById('next').onclick = () => swiper.slideNext();
}

/* =========================
   LOAD JSON
========================= */
fetch('captions.json')
  .then(res => {
    if (!res.ok) throw new Error("JSON not found");
    return res.json();
  })
  .then(data => {

    captions = Array.isArray(data) ? data : [];

    buildSlides(captions.length);
    initSwiper();

    updateUI(0);
  })
  .catch(err => {
    console.error(err);
    captionEl.textContent = "Error loading captions.json";
  });

</script>

</body>
</html>
