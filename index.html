<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>道案内</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: #f7f5f0;
  font-family: sans-serif;
}

.container {
  width: 100vw;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* スライダー */
.swiper {
  flex: 1;
  width: 100%;
  position: relative;
}

.swiper-slide {
  opacity: 0.4;
  transition: 0.3s;
}

.swiper-slide-active {
  opacity: 1;
}

.photo {
  width: 100%;
  height: 100%;
  object-fit: contain;
  background: #f7f5f0;
}

/* 矢印 */
.nav-arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  font-size: 42px;
  color: #c7a86b;
  z-index: 20;
  cursor: pointer;
}

.nav-arrow.left { left: 10px; }
.nav-arrow.right { right: 10px; }

/* 説明 */
.caption-bar {
  height: 70px;
  display: flex;
  align-items: center;
  justify-content: center;

  padding: 0 12px;
  font-size: 16px;
  color: #333;

  background: rgba(255,255,255,0.92);
  border-top: 1px solid rgba(0,0,0,0.08);
}

/* 数値 */
.counter {
  position: absolute;
  bottom: 12px;
  left: 50%;
  transform: translateX(-50%);

  background: rgba(0,0,0,0.55);
  color: #fff;

  padding: 6px 14px;
  border-radius: 20px;

  font-size: 14px;
}
</style>
</head>

<body>

<div class="container">

  <div class="swiper">

    <div class="nav-arrow left" id="prev">＜</div>
    <div class="nav-arrow right" id="next">＞</div>

    <div class="swiper-wrapper" id="slides"></div>

    <div class="counter" id="counter">1 / 1</div>

  </div>

  <div class="caption-bar" id="caption">読み込み中...</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>
let captions = [];

const slides = document.getElementById('slides');
const captionEl = document.getElementById('caption');
const counterEl = document.getElementById('counter');

/* =========================
   スライド生成（JSON基準）
========================= */

fetch('captions.json')
  .then(res => res.json())
  .then(data => {

    captions = Array.isArray(data) ? data : [];

    // 画像も captions に合わせる（重要）
    captions.forEach((_, i) => {
      slides.innerHTML += `
        <div class="swiper-slide">
          <img src="root${i + 1}.jpg" class="photo">
        </div>
      `;
    });

    initSwiper();
  });

/* =========================
   Swiper初期化
========================= */

function initSwiper() {

  const swiper = new Swiper('.swiper', {
    loop: false,
    centeredSlides: true,
    slidesPerView: 1.15,
    spaceBetween: 10,
    speed: 300,

    on: {
      init: function () {
        updateUI(0);
      },

      realIndexChange: function () {
        updateUI(this.realIndex);
      }
    }
  });

  /* 矢印 */
  document.getElementById('prev').onclick = () => swiper.slidePrev();
  document.getElementById('next').onclick = () => swiper.slideNext();
}

/* =========================
   UI更新（完全統一）
========================= */

function updateUI(i) {

  const len = captions.length;

  captionEl.innerHTML = captions[i] ?? "";

  counterEl.textContent = `${i + 1} / ${len}`;
}
</script>

</body>
</html>
