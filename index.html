<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>道案内</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: #f7f5f0;
  font-family: sans-serif;
}

.container {
  width: 100vw;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* スライダー */
.swiper {
  flex: 1;
  width: 100%;
  position: relative;
}

.swiper-slide {
  opacity: 0.4;
  transition: 0.3s;
}

.swiper-slide-active {
  opacity: 1;
}

.photo {
  width: 100%;
  height: 100%;
  object-fit: contain;
  background: #f7f5f0;
}

/* 矢印 */
.nav-arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  font-size: 42px;
  color: #c7a86b;
  z-index: 20;
  cursor: pointer;
}

.nav-arrow.left { left: 10px; }
.nav-arrow.right { right: 10px; }

/* 説明 */
.caption-bar {
  height: 70px;
  display: flex;
  align-items: center;
  justify-content: center;

  padding: 0 12px;
  font-size: 16px;
  color: #333;

  background: rgba(255,255,255,0.9);
  border-top: 1px solid rgba(0,0,0,0.08);
}

/* ページネーション（安全版：flex） */
.swiper-pagination {
  position: absolute;
  bottom: 10px !important;

  width: 100%;
  display: flex;
  flex-wrap: wrap;

  justify-content: center;
  gap: 8px;
  padding: 8px 12px;
  box-sizing: border-box;
}

.swiper-pagination-bullet {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #c7a86b;
  opacity: 0.35;
  border: 1.5px solid rgba(255,255,255,0.9);
  flex: 0 0 auto;
}

.swiper-pagination-bullet-active {
  background: #a8864a;
  opacity: 1;
  transform: scale(1.25);
}
</style>
</head>

<body>

<div class="container">

  <div class="swiper">

    <div class="nav-arrow left" id="prev">＜</div>
    <div class="nav-arrow right" id="next">＞</div>

    <div class="swiper-wrapper" id="slides"></div>
    <div class="swiper-pagination"></div>

  </div>

  <div class="caption-bar" id="caption">
    読み込み中...
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>
const total = 19;

let captions = [];
const captionEl = document.getElementById('caption');
const slides = document.getElementById('slides');

/* 画像生成 */
for (let i = 1; i <= total; i++) {
  slides.innerHTML += `
    <div class="swiper-slide">
      <img src="root${i}.jpg" class="photo">
    </div>
  `;
}

/* JSON読み込み */
fetch('captions.json')
  .then(res => res.json())
  .then(data => {
    captions = data;
    captionEl.innerHTML = captions[0] ?? "";
  });

/* Swiper */
const swiper = new Swiper('.swiper', {
  loop: false,
  centeredSlides: true,
  slidesPerView: 1.15,
  spaceBetween: 10,
  speed: 300,

  pagination: {
    el: '.swiper-pagination',
    clickable: true
  },

  on: {
    slideChange: function () {
      const i = this.realIndex;

      // ★安全ガード（ズレ防止）
      if (!captions || !captions.length) return;

      captionEl.innerHTML = captions[i] ?? "";
    }
  }
});

/* 矢印 */
document.getElementById('prev').onclick = () => swiper.slidePrev();
document.getElementById('next').onclick = () => swiper.slideNext();
</script>

</body>
</html>
