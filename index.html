<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>道案内</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  background: #f7f5f0;
  font-family: sans-serif;
  overflow: hidden;
}

.container {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
}

.swiper {
  flex: 1;
  width: 100%;
}

.swiper-slide {
  display: flex;
  align-items: center;
  justify-content: center;
}

.photo {
  width: 100%;
  height: 100%;
  object-fit: contain;
  background: #f7f5f0;
}

/* 矢印 */
.nav-arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  font-size: 42px;
  color: #c7a86b;
  z-index: 10;
  cursor: pointer;
}

.nav-arrow.left { left: 10px; }
.nav-arrow.right { right: 10px; }

/* 説明 */
.caption-bar {
  height: 70px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 12px;
  font-size: 16px;
  background: rgba(255,255,255,0.95);
  border-top: 1px solid rgba(0,0,0,0.08);
}

/* カウンター */
.counter {
  position: absolute;
  bottom: 12px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.6);
  color: #fff;
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="container">

  <div class="swiper">

    <div class="nav-arrow left" id="prev">＜</div>
    <div class="nav-arrow right" id="next">＞</div>

    <div class="swiper-wrapper" id="slides"></div>

    <div class="counter" id="counter">- / -</div>

  </div>

  <div class="caption-bar" id="caption">読み込み中...</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>
let captions = [];
let swiper = null;

const slides = document.getElementById('slides');
const captionEl = document.getElementById('caption');
const counterEl = document.getElementById('counter');

/* 安全UI更新 */
function updateUI(i) {
  captionEl.innerHTML = captions[i] ?? "";
  counterEl.textContent = `${i + 1} / ${captions.length || 0}`;
}

/* スライド生成 */
function buildSlides(len) {

  slides.innerHTML = "";

  for (let i = 1; i <= len; i++) {
    const slide = document.createElement('div');
    slide.className = 'swiper-slide';

    const img = document.createElement('img');
    img.src = `root${i}.jpg`;
    img.className = 'photo';

    slide.appendChild(img);
    slides.appendChild(slide);
  }
}

/* Swiper初期化 */
function initSwiper() {

  if (swiper) swiper.destroy(true, true);

  swiper = new Swiper('.swiper', {

    loop: false,
    centeredSlides: true,
    slidesPerView: 1,

    on: {
      init: function () {
        updateUI(0);
      },
      realIndexChange: function () {
        updateUI(this.realIndex);
      }
    }
  });

  document.getElementById('prev').onclick = () => swiper.slidePrev();
  document.getElementById('next').onclick = () => swiper.slideNext();
}

/* JSON読み込み */
fetch('captions.json')
  .then(res => {
    if (!res.ok) throw new Error("JSON not found");
    return res.json();
  })
  .then(data => {

    captions = Array.isArray(data) ? data : [];

    buildSlides(captions.length);
    initSwiper();

    updateUI(0);
  })
  .catch(err => {
    console.error(err);
    captionEl.innerHTML = "読み込みエラー（captions.json確認）";
  });

</script>

</body>
</html>
