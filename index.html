<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>道案内</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: black;
  font-family: sans-serif;
}

.swiper {
  width: 100vw;
  height: 100vh;
  position: relative;
}

/* スライド */
.slide {
  position: relative;
}

.photo {
  width: 100%;
  height: 100vh;
  object-fit: contain; /* ← cover → contain に変更 */
  background: black;
}

/* 中央強調 */
.swiper-slide {
  opacity: 0.5;
  transition: 0.3s;
}

.swiper-slide-active {
  opacity: 1;
}

/* 説明テキスト（見やすく改善） */
.caption {
  position: absolute;
  bottom: 60px;
  left: 50%;
  transform: translateX(-50%);
  color: white;
  font-size: 16px;
  font-weight: bold;
  padding: 10px 16px;
  border-radius: 20px;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(4px);
  max-width: 80%;
  text-align: center;
}

/* ページドット */
.swiper-pagination-bullet {
  background: white;
}

/* 左右矢印（ヒント） */
.nav-arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  font-size: 26px;
  color: white;
  background: rgba(0,0,0,0.5);
  padding: 10px 14px;
  border-radius: 50%;
  z-index: 10;
  pointer-events: none;
}

.nav-arrow.left {
  left: 10px;
}

.nav-arrow.right {
  right: 10px;
}
</style>
</head>

<body>

<div class="swiper">

  <!-- 矢印ヒント -->
  <div class="nav-arrow left">←</div>
  <div class="nav-arrow right">→</div>

  <div class="swiper-wrapper" id="slides"></div>
  <div class="swiper-pagination"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>
const total = 19;
const container = document.getElementById('slides');

for (let i = 1; i <= total; i++) {
  const text = (i === total) ? "到着です！" : "";

  container.innerHTML += `
    <div class="swiper-slide">
      <div class="slide">
        <img src="root${i}.jpg" class="photo">
        <div class="caption">${text}</div>
      </div>
    </div>
  `;
}

new Swiper('.swiper', {
  loop: false,
  centeredSlides: true,
  slidesPerView: 1.3,
  spaceBetween: 12,
  speed: 400,

  pagination: {
    el: '.swiper-pagination',
    clickable: true
  }
});
</script>

</body>
</html>
