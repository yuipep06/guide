<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>道案内</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: black;
  font-family: sans-serif;
}

/* 全画面 */
.swiper {
  width: 100vw;
  height: 100vh;
  position: relative;
}

/* スライド */
.photo {
  width: 100%;
  height: 100vh;
  object-fit: contain; /* ← 切れない */
  background: black;
}

/* チラ見せ＋中央強調 */
.swiper-slide {
  opacity: 0.4;
  transition: 0.3s;
}

.swiper-slide-active {
  opacity: 1;
}

/* 説明 */
.caption {
  position: absolute;
  bottom: 60px;
  left: 50%;
  transform: translateX(-50%);
  color: white;
  font-size: 16px;
  font-weight: bold;
  padding: 10px 16px;
  border-radius: 20px;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(4px);
  max-width: 80%;
  text-align: center;
}

/* ドット */
.swiper-pagination-bullet {
  background: white;
}

/* ===== 矢印（重要）===== */
.nav-arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  font-size: 40px;
  color: white;
  z-index: 20;
  pointer-events: none;
  opacity: 0.8;
  text-shadow: 0 0 10px rgba(0,0,0,0.8);
}

/* 左右境界付近 */
.nav-arrow.left {
  left: 12px;
}

.nav-arrow.right {
  right: 12px;
}
</style>
</head>

<body>

<div class="swiper">

  <!-- 矢印（境界ヒント） -->
  <div class="nav-arrow left">＜</div>
  <div class="nav-arrow right">＞</div>

  <div class="swiper-wrapper" id="slides"></div>
  <div class="swiper-pagination"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>
const total = 19;
const container = document.getElementById('slides');

for (let i = 1; i <= total; i++) {
  const text = (i === total) ? "到着です！" : "";

  container.innerHTML += `
    <div class="swiper-slide">
      <div class="slide">
        <img src="root${i}.jpg" class="photo">
        <div class="caption">${text}</div>
      </div>
    </div>
  `;
}

new Swiper('.swiper', {
  loop: false,
  centeredSlides: true,
  slidesPerView: 1.15,  /* ← 中央＋チラ見せ */
  spaceBetween: 10,
  speed: 400,

  pagination: {
    el: '.swiper-pagination',
    clickable: true
  }
});
</script>

</body>
</html>
