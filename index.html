<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>道案内</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: black;
  font-family: sans-serif;
}

.swiper {
  width: 100vw;
  height: 100vh;
}

.slide {
  position: relative;
}

.photo {
  width: 100%;
  height: 100vh;
  object-fit: cover;
}

.caption {
  position: absolute;
  bottom: 0;
  width: 100%;
  color: white;
  font-size: 14px;
  padding: 10px;
  text-align: center;
  background: rgba(0,0,0,0.4);
}

.swiper-pagination-bullet {
  background: white;
}
</style>
</head>

<body>

<div class="swiper">
  <div class="swiper-wrapper" id="slides"></div>
  <div class="swiper-pagination"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>
const total = 19;
const container = document.getElementById('slides');

for (let i = 1; i <= total; i++) {
  const text = (i === total) ? "到着です！" : "";
  
  container.innerHTML += `
    <div class="swiper-slide">
      <div class="slide">
        <img src="root${i}.jpg" class="photo">
        <div class="caption">${text}</div>
      </div>
    </div>
  `;
}

new Swiper('.swiper', {
  loop: false,
  speed: 400,
  pagination: {
    el: '.swiper-pagination',
    clickable: true
  }
});
</script>

</body>
</html>
