<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Route Guide</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  background: #f7f5f0;
  font-family: sans-serif;
  overflow: hidden;
}

/* =========================
   MAIN LAYOUT
========================= */
.container {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
}

/* =========================
   PHOTO (最大化)
========================= */
.swiper {
  flex: 1;
  width: 100%;
  overflow: hidden;
  background: #f7f5f0;
}

.swiper-slide {
  display: flex;
  align-items: center;
  justify-content: center;
}

.photo {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

/* =========================
   COUNTER（小さく固定）
========================= */
.counter {
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;

  font-size: 13px;
  color: #333;
  background: rgba(0,0,0,0.04);
}

/* =========================
   CAPTION（可変フッター）
========================= */
.caption-bar {
  padding: 10px 14px;
  font-size: 16px;
  line-height: 1.4;

  background: rgba(255,255,255,0.95);
  border-top: 1px solid rgba(0,0,0,0.08);

  /* 重要：高さ固定しない */
  width: 100%;
  box-sizing: border-box;

  word-break: break-word;
  overflow-wrap: anywhere;
}

/* Safari微調整 */
.safari .caption-bar {
  line-height: 1.35;
}

/* =========================
   ARROWS
========================= */
.nav-arrow {
  position: absolute;
  top: 45%;
  transform: translateY(-50%);
  font-size: 42px;
  color: #c7a86b;
  z-index: 999;
  cursor: pointer;
  user-select: none;
}

.nav-arrow.left { left: 10px; }
.nav-arrow.right { right: 10px; }
</style>
</head>

<body>

<div class="container">

  <!-- PHOTO -->
  <div class="swiper">
    <div class="swiper-wrapper" id="slides"></div>

    <div class="nav-arrow left" id="prev">‹</div>
    <div class="nav-arrow right" id="next">›</div>
  </div>

  <!-- COUNTER -->
  <div class="counter" id="counter">- / -</div>

  <!-- CAPTION -->
  <div class="caption-bar" id="caption">Loading...</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>
let captions = [];
let swiper = null;

const slides = document.getElementById('slides');
const captionEl = document.getElementById('caption');
const counterEl = document.getElementById('counter');

/* UI update */
function updateUI(i) {
  captionEl.textContent = captions[i] ?? "";
  counterEl.textContent = `${i + 1} / ${captions.length || 0}`;
}

/* build slides */
function buildSlides(len) {
  slides.innerHTML = "";

  for (let i = 1; i <= len; i++) {
    const slide = document.createElement('div');
    slide.className = 'swiper-slide';

    const img = document.createElement('img');
    img.src = `root${i}.jpg`;
    img.className = 'photo';

    slide.appendChild(img);
    slides.appendChild(slide);
  }
}

/* swiper */
function initSwiper() {

  if (swiper) swiper.destroy(true, true);

  swiper = new Swiper('.swiper', {
    loop: false,
    centeredSlides: true,
    slidesPerView: 1,

    on: {
      init: function () {
        updateUI(this.realIndex);
      },
      slideChange: function () {
        updateUI(this.realIndex);
      }
    }
  });

  document.getElementById('prev').onclick = () => swiper.slidePrev();
  document.getElementById('next').onclick = () => swiper.slideNext();
}

/* load JSON */
fetch('captions.json')
  .then(res => res.json())
  .then(data => {

    captions = Array.isArray(data) ? data : [];

    buildSlides(captions.length);
    initSwiper();

    updateUI(0);
  });
</script>

</body>
</html>
